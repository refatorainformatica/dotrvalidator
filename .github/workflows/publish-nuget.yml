name: Publish NuGet

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Restore
        run: dotnet restore DotRValidator.slnx

      - name: Pack
        run: |
          dotnet pack src/DotRValidator/DotRValidator.csproj \
            --configuration Release \
            --output ./artifacts \
            ${VERSION:+--property Version=$VERSION --property PackageVersion=$VERSION}

      - name: NuGet login (OIDC)
        id: login
        uses: NuGet/login@v1
        with:
          user: RefatoraInformatica

      - name: Push to NuGet.org
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
